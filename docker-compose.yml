services:
  db:
    image: postgres:16-alpine
    container_name: tarot_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    container_name: tarot_bot
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db        # переопределяем хост на имя сервиса
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
